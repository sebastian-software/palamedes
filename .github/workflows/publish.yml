name: Publish

env:
  CARGO_HTTP_MULTIPLEXING: "false"
  CARGO_NET_RETRY: "10"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_publish:
        description: "Publish the current release version even without a release commit"
        required: false
        type: boolean
        default: false
      dry_run:
        description: "Build and smoke-test the native packages without publishing anything"
        required: false
        type: boolean
        default: false

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  determine-release:
    runs-on: ubuntu-24.04
    outputs:
      should_publish: ${{ steps.release.outputs.should_publish }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect release commit
        id: release
        shell: bash
        env:
          FORCE_PUBLISH: ${{ github.event_name == 'workflow_dispatch' && (inputs.force_publish || inputs.dry_run) && 'true' || 'false' }}
        run: |
          set -euo pipefail

          has_release_commit=false

          if [ "$FORCE_PUBLISH" = "true" ]; then
            has_release_commit=true
          elif [ "$GITHUB_EVENT_NAME" = "push" ]; then
            base_ref="${{ github.event.before }}"
            if [ "$base_ref" = "0000000000000000000000000000000000000000" ]; then
              base_ref="$(git rev-parse HEAD^)"
            fi

            if git log --format=%s "$base_ref..${{ github.sha }}" | grep -Eq '^chore: release '; then
              has_release_commit=true
            fi
          fi

          if [ "$has_release_commit" = true ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi

  validate-release:
    needs: determine-release
    if: needs.determine-release.outputs.should_publish == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      PALAMEDES_RUST_PROFILE: release
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check release package set
        run: pnpm check:release-set

      - name: Build packages
        run: pnpm build

      - name: Check published TypeScript declarations
        run: pnpm check:published-types

      - name: Run tests
        run: pnpm test

      - name: Check types
        run: pnpm check-types

  publish-native:
    needs:
      - determine-release
      - validate-release
    if: needs.determine-release.outputs.should_publish == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - package_name: "@palamedes/core-node-darwin-arm64"
            runner: macos-14
            rust_target: ""
          - package_name: "@palamedes/cli-darwin-arm64"
            runner: macos-14
            rust_target: ""
          - package_name: "@palamedes/core-node-linux-x64-gnu"
            runner: ubuntu-24.04
            rust_target: ""
          - package_name: "@palamedes/cli-linux-x64-gnu"
            runner: ubuntu-24.04
            rust_target: ""
          - package_name: "@palamedes/core-node-linux-x64-musl"
            runner: ubuntu-24.04
            rust_target: x86_64-unknown-linux-musl
          - package_name: "@palamedes/cli-linux-x64-musl"
            runner: ubuntu-24.04
            rust_target: x86_64-unknown-linux-musl
          - package_name: "@palamedes/core-node-linux-arm64-gnu"
            runner: ubuntu-24.04-arm
            rust_target: ""
          - package_name: "@palamedes/cli-linux-arm64-gnu"
            runner: ubuntu-24.04-arm
            rust_target: ""
          - package_name: "@palamedes/core-node-win32-x64-msvc"
            runner: windows-2025
            rust_target: ""
          - package_name: "@palamedes/cli-win32-x64-msvc"
            runner: windows-2025
            rust_target: ""
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      id-token: write
    env:
      NPM_CONFIG_PROVENANCE: true
      PALAMEDES_ALLOW_CROSS_NATIVE: ${{ matrix.rust_target != '' && '1' || '0' }}
      PALAMEDES_RUST_PROFILE: release

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add musl Rust target
        if: matrix.rust_target != ''
        run: rustup target add "${{ matrix.rust_target }}"

      - name: Install musl toolchain
        if: matrix.rust_target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build native package
        if: matrix.package_name != '@palamedes/core-node-linux-x64-musl'
        run: pnpm --filter "${{ matrix.package_name }}" build

      # The core-node musl addon is a `cdylib`, so it cannot use musl's default
      # `+crt-static` (cargo refuses a statically linked cdylib) and must link
      # dynamically. Cross-linking that dynamic cdylib from the glibc host makes
      # the linker emit a glibc program interpreter (`ld-linux-x86-64.so.2`),
      # which then fails to load inside a musl runtime. Building it in a
      # musl-native environment instead makes the toolchain resolve the correct
      # `ld-musl-x86-64.so.1` loader. (The static-musl CLI binary has no such
      # problem, so it keeps building on the host above.)
      - name: Build musl core-node addon (native musl toolchain)
        if: matrix.package_name == '@palamedes/core-node-linux-x64-musl'
        run: >
          docker run --rm
          -v "$PWD:/workspace"
          -w /workspace/packages/core-node-linux-x64-musl
          -e PALAMEDES_RUST_PROFILE=release
          rust:alpine
          sh -c "apk add --no-cache nodejs build-base &&
          node ../core-node/scripts/build-native.mjs"

      - name: Smoke-test native Node package
        if: startsWith(matrix.package_name, '@palamedes/core-node-') && matrix.rust_target == ''
        run: pnpm --filter "${{ matrix.package_name }}" exec node --input-type=module -e "import { createRequire } from 'node:module'; const require = createRequire(import.meta.url); const native = require('./palamedes-node.node'); if (typeof native.transformMacros !== 'function') process.exit(1)"

      - name: Smoke-test musl native Node package
        if: startsWith(matrix.package_name, '@palamedes/core-node-') && matrix.rust_target == 'x86_64-unknown-linux-musl'
        run: >
          docker run --rm
          -v "$PWD:/workspace"
          -w "/workspace/packages/core-node-linux-x64-musl"
          node:24-alpine
          node --input-type=module -e
          "import { createRequire } from 'node:module';
          const require = createRequire(import.meta.url);
          const native = require('./palamedes-node.node');
          if (typeof native.transformMacros !== 'function') process.exit(1)"

      - name: Smoke-test native CLI package
        if: startsWith(matrix.package_name, '@palamedes/cli-') && matrix.rust_target == ''
        run: >
          pnpm --filter "${{ matrix.package_name }}" exec node --input-type=module -e
          "import { execFileSync } from 'node:child_process';
          const bin = process.platform === 'win32' ? './bin/pmds.exe' : './bin/pmds';
          const out = execFileSync(bin, ['version'], { encoding: 'utf8' });
          if (!out.includes('pmds (Palamedes)')) process.exit(1)"

      - name: Smoke-test musl native CLI package
        if: startsWith(matrix.package_name, '@palamedes/cli-') && matrix.rust_target == 'x86_64-unknown-linux-musl'
        run: >
          docker run --rm
          -v "$PWD:/workspace"
          -w "/workspace/packages/cli-linux-x64-musl"
          node:24-alpine
          node --input-type=module -e
          "import { execFileSync } from 'node:child_process';
          const out = execFileSync('./bin/pmds', ['version'], { encoding: 'utf8' });
          if (!out.includes('pmds (Palamedes)')) process.exit(1)"

      - name: Publish native package
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.dry_run }}
        run: node ./scripts/publish-package-if-needed.mjs "${{ matrix.package_name }}"

  publish-js:
    needs:
      - determine-release
      - publish-native
    if: ${{ needs.determine-release.outputs.should_publish == 'true' && (github.event_name != 'workflow_dispatch' || !inputs.dry_run) }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    env:
      NPM_CONFIG_PROVENANCE: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build publishable packages
        run: >
          pnpm -r
          --filter @palamedes/core
          --filter @palamedes/config
          --filter @palamedes/runtime
          --filter @palamedes/core-node
          --filter @palamedes/transform
          --filter @palamedes/extractor
          --filter @palamedes/react
          --filter @palamedes/remix
          --filter @palamedes/solid
          --filter @palamedes/cli
          --filter @palamedes/vite-plugin
          --filter @palamedes/next-plugin
          --filter palamedes
          --filter create-palamedes
          build

      - name: Publish JavaScript packages
        run: |
          node ./scripts/publish-package-if-needed.mjs @palamedes/core
          node ./scripts/publish-package-if-needed.mjs @palamedes/config
          node ./scripts/publish-package-if-needed.mjs @palamedes/runtime
          node ./scripts/publish-package-if-needed.mjs @palamedes/core-node
          node ./scripts/publish-package-if-needed.mjs @palamedes/transform
          node ./scripts/publish-package-if-needed.mjs @palamedes/extractor
          node ./scripts/publish-package-if-needed.mjs @palamedes/react
          node ./scripts/publish-package-if-needed.mjs @palamedes/remix
          node ./scripts/publish-package-if-needed.mjs @palamedes/solid
          node ./scripts/publish-package-if-needed.mjs @palamedes/cli
          node ./scripts/publish-package-if-needed.mjs @palamedes/vite-plugin
          node ./scripts/publish-package-if-needed.mjs @palamedes/next-plugin
          node ./scripts/publish-package-if-needed.mjs palamedes
          node ./scripts/publish-package-if-needed.mjs create-palamedes
