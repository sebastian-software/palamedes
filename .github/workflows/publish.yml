name: Publish

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  determine-release:
    runs-on: ubuntu-24.04
    outputs:
      should_publish: ${{ steps.release.outputs.should_publish }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect release commit
        id: release
        shell: bash
        run: |
          set -euo pipefail

          base_ref="${{ github.event.before }}"
          if [ "$base_ref" = "0000000000000000000000000000000000000000" ]; then
            base_ref="$(git rev-parse HEAD^)"
          fi

          has_release_commit=false
          if git log --format=%s "$base_ref..${{ github.sha }}" | grep -Eq '^chore: release '; then
            has_release_commit=true
          fi

          if [ "$has_release_commit" = true ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi

  publish-native:
    needs: determine-release
    if: needs.determine-release.outputs.should_publish == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - package_name: "@palamedes/core-node-darwin-arm64"
            runner: macos-14
          - package_name: "@palamedes/core-node-linux-x64-gnu"
            runner: ubuntu-24.04
          - package_name: "@palamedes/core-node-linux-arm64-gnu"
            runner: ubuntu-24.04-arm
          - package_name: "@palamedes/core-node-win32-x64-msvc"
            runner: windows-2025
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      id-token: write
    env:
      NPM_CONFIG_PROVENANCE: true
      PALAMEDES_RUST_PROFILE: release

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.32.0 --activate

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build native package
        run: pnpm --filter "${{ matrix.package_name }}" build

      - name: Publish native package
        run: pnpm --filter "${{ matrix.package_name }}" publish --access public --no-git-checks

  publish-js:
    needs:
      - determine-release
      - publish-native
    if: needs.determine-release.outputs.should_publish == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    env:
      NPM_CONFIG_PROVENANCE: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.32.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build publishable packages
        run: >
          pnpm -r
          --filter @palamedes/runtime
          --filter @palamedes/core-node
          --filter @palamedes/transform
          --filter @palamedes/extractor
          --filter @palamedes/cli
          --filter @palamedes/vite-plugin
          --filter @palamedes/next-plugin
          --filter palamedes
          --filter create-palamedes
          build

      - name: Publish JavaScript packages
        run: >
          pnpm -r
          --filter @palamedes/runtime
          --filter @palamedes/core-node
          --filter @palamedes/transform
          --filter @palamedes/extractor
          --filter @palamedes/cli
          --filter @palamedes/vite-plugin
          --filter @palamedes/next-plugin
          --filter palamedes
          --filter create-palamedes
          publish --no-git-checks
