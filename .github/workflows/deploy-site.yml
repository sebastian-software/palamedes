name: Deploy Site

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
    paths:
      - "site/**"
      - "docs/**"
      - "adr/**"
      - "DECISIONS.md"
      - "packages/**/src/**"
      - "packages/**/package.json"
      - "packages/**/tsconfig.json"
      - "pnpm-lock.yaml"
      - "benchmarks/e2e-workflow/results/**"
      - "llms.txt"
      - "llms-full.txt"
      - ".github/workflows/deploy-site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-site
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm build:site

      - name: Add SPA fallback as 404 page
        run: cp site/build/client/__spa-fallback.html site/build/client/404.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site/build/client

  deploy:
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  verify:
    needs: deploy
    runs-on: ubuntu-24.04
    steps:
      - name: Smoke-test the live site
        shell: bash
        run: |
          set -euo pipefail

          base="https://palamedes.dev"

          fetch() {
            local path="$1"
            local attempt
            for attempt in 1 2 3; do
              if body=$(curl -sS --max-time 20 -w '\n%{http_code}' "$base$path"); then
                status="${body##*$'\n'}"
                content="${body%$'\n'*}"
                return 0
              fi
              echo "attempt $attempt for $path failed; retrying in 20s"
              sleep 20
            done
            echo "could not reach $base$path"
            return 1
          }

          check() {
            local path="$1" expected_status="$2" needle="${3:-}"
            fetch "$path"
            if [ "$status" != "$expected_status" ]; then
              echo "FAIL $path: expected HTTP $expected_status, got $status"
              exit 1
            fi
            if [ -n "$needle" ] && ! grep -qF "$needle" <<<"$content"; then
              echo "FAIL $path: body does not contain '$needle'"
              exit 1
            fi
            echo "ok $path ($status)"
          }

          check "/" 200 "One translation model."
          check "/frameworks" 200 "Six frameworks."
          check "/proof" 200 "Claims you can re-run."
          check "/get-started" 200 "First working translation"
          check "/compare" 200 "Narrower than the alternatives."
          check "/blog" 200 "Building i18n tooling"
          check "/blog/measuring-palamedes-honestly" 200 "Measuring Palamedes Honestly"
          check "/docs" 200 "Documentation"
          check "/docs/cli" 200 "CLI Reference"
          check "/docs/example-screenshots" 200 "Example Screenshots"
          check "/decisions" 200 "Architecture Decisions"
          check "/decisions/003-source-string-first-message-identity" 200 "ADR-003: Source-String-First Message Identity"
          check "/api-reference" 200 "Generated API Reference"
          check "/api-reference/core" 200 "Core"
          check "/llms.txt" 200 "palamedes.yaml"
          check "/llms-full.txt" 200 "palamedes.yaml"
          check "/sitemap.xml" 200 "https://palamedes.dev/proof"
          check "/sitemap.xml" 200 "https://palamedes.dev/docs/cli"
          check "/sitemap.xml" 200 "https://palamedes.dev/api-reference/core"
          check "/robots.txt" 200 "Sitemap:"
          check "/does-not-exist" 404 "<html"

          echo "live site verified at $base"
