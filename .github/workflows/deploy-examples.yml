name: Deploy Examples

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      example_id:
        description: Example to deploy
        required: true
        default: all
        type: choice
        options:
          - all
          - nextjs-cookie
          - nextjs-route
          - tanstack-cookie
          - tanstack-route
          - waku-cookie
          - waku-route
          - react-router-cookie
          - react-router-route

concurrency:
  group: deploy-examples-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: false

jobs:
  select:
    runs-on: ubuntu-24.04
    outputs:
      environment: ${{ steps.select.outputs.environment }}
      github_environment: ${{ steps.select.outputs.github_environment }}
      matrix: ${{ steps.select.outputs.matrix }}
      verify_id: ${{ steps.select.outputs.verify_id }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Set up pnpm cache
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version: 24

      - name: Select deployment targets
        id: select
        shell: bash
        run: |
          set -euo pipefail

          environment=production
          github_environment=demo-production
          example_id=""

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            environment=preview
            github_environment=demo-preview
            if [ "${{ inputs.example_id }}" != "all" ]; then
              example_id="${{ inputs.example_id }}"
            fi
          fi

          args=()
          if [ -n "$example_id" ]; then
            args+=(--id "$example_id")
          fi

          matrix="$(node ./scripts/print-example-matrix.mjs "${args[@]}")"

          echo "environment=$environment" >> "$GITHUB_OUTPUT"
          echo "github_environment=$github_environment" >> "$GITHUB_OUTPUT"
          echo "verify_id=$example_id" >> "$GITHUB_OUTPUT"
          {
            echo "matrix<<EOF"
            echo "$matrix"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  validate:
    needs: select
    runs-on: ubuntu-24.04
    environment: ${{ needs.select.outputs.github_environment }}
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Set up pnpm cache
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version: 24

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify examples
        shell: bash
        run: |
          set -euo pipefail

          if [ -n "${{ needs.select.outputs.verify_id }}" ]; then
            pnpm verify:examples -- --id "${{ needs.select.outputs.verify_id }}"
          else
            pnpm verify:examples
          fi

  deploy:
    needs:
      - select
      - validate
    runs-on: ubuntu-24.04
    environment: ${{ needs.select.outputs.github_environment }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        example: ${{ fromJson(needs.select.outputs.matrix) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Set up pnpm cache
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version: 24

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy ${{ matrix.example.id }}
        id: deploy
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_IDS_JSON: ${{ secrets.VERCEL_PROJECT_IDS_JSON }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: >
          pnpm deploy:examples --
          --environment ${{ needs.select.outputs.environment }}
          --id ${{ matrix.example.id }}
          --github-output "$GITHUB_OUTPUT"
          --summary-file "$GITHUB_STEP_SUMMARY"

      - name: Echo deployment URL
        run: echo "${{ steps.deploy.outputs.deployment_url }}"
